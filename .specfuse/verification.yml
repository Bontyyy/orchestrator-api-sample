# Verification contract for this component repo, consumed by the component
# agent verification skill (agents/component/skills/verification/SKILL.md in
# the orchestration repo).
#
# Six gates are declared. Order below is the execution order the skill uses:
# cheaper gates fail fast, expensive gates run only once earlier ones pass.

tests:
  command: "dotnet test --no-build --nologo --verbosity normal"
  passing_pattern: "Passed!"

coverage:
  command: "dotnet test --no-build --nologo --collect:'XPlat Code Coverage' --results-directory ./coverage"
  report_path: "./coverage"
  minimum_line_coverage: 0.90

compiler_warnings:
  command: "dotnet build --no-restore /warnaserror"

lint:
  command: "dotnet format --verify-no-changes --no-restore"

security_scan:
  command: "./.specfuse/scripts/security-scan.sh"
  report_path: "./security-scan.json"

build:
  command: "dotnet build --no-restore --configuration Release"
